# Copy fragments into server { } when using ngx_pagespeed 1.13.35.1+ (not in stock nginx images).
# Run `nginx -t` after merging with your real CSP and enabling required modules
# (sub_filter is standard; set_secure_random_alphanum needs set-misc-nginx-module).

# 1) Opt in: PageSpeed respects incoming CSP (including nonces).
pagespeed HonorCsp on;

# 2) Per-request nonce (set-misc-nginx-module). Use nonce="**CSP_NONCE**" in HTML; substitute after PageSpeed.
# set_secure_random_alphanum $csp_nonce 22;
#
# Merge with your full policy — script-src (and style-src if nonced) must include the same nonce:
# add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'nonce-$csp_nonce'; object-src 'none'; base-uri 'self'; upgrade-insecure-requests" always;
#
# sub_filter '**CSP_NONCE**' $csp_nonce;
# sub_filter_once off;
# sub_filter_types text/html;
